name: CI/CD

on: [push, pull_request]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Use pnpm
      uses: pnpm/action-setup@v4

    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Install
      run: pnpm install --frozen-lockfile

    - name: Build
      run: pnpm build

    - name: Test
      run: pnpm test

    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage/**/cobertura-coverage.xml
        badge: true
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '60 80'

    # - name: Add Coverage PR Comment
    #   uses: marocchino/sticky-pull-request-comment@v2
    #   if: github.event_name == 'pull_request'
    #   with:
    #     recreate: true
    #     path: code-coverage-results.md

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist

  release:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
      deployments: write
      id-token: write
    needs: [build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Increment version
        run: pnpm version patch --no-git-tag-version

      # Publishes the dist downloaded above, as verified by build-and-test.
      # Do not add a prepack/prepare build hook: tsdown's clean: true would wipe
      # that artifact and publish an unverified rebuild instead.
      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Get version from package.json
        id: get_version
        run: echo "::set-output name=version::$(node -p "require('./package.json').version")"

      - name: Set the tag to v${{ steps.get_version.outputs.version }}
        run: |
          git tag v${{ steps.get_version.outputs.version }}

      - name: commit & push
        run: |
          git commit -am v${{ steps.get_version.outputs.version }}
          git push
          git push origin v${{ steps.get_version.outputs.version }}
